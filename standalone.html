<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16181d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="个人效率手册 — 任务打卡、特殊日子提醒、农历日历" />
  <link rel="manifest" href="manifest.json" />
  <title>个人效率手册</title>
  <style>
    :root{--bg:#f4f5f7;--surface:#fff;--sidebar-bg:#16181d;--sidebar-hover:#22252c;--sidebar-active:#2a2e38;--text:#1a1d23;--text-secondary:#6b7280;--text-muted:#9ca3af;--accent:#0d9488;--accent-light:#ccfbf1;--accent-hover:#0f766e;--border:#e5e7eb;--danger:#ef4444;--holiday:#dc2626;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--font:system-ui,-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif}
    [data-theme="dark"]{--bg:#0f1117;--surface:#1a1d27;--sidebar-bg:#0a0c10;--sidebar-hover:#161920;--sidebar-active:#1f2430;--text:#e8eaed;--text-secondary:#9aa0a6;--text-muted:#6b7280;--accent:#2dd4bf;--accent-light:#134e4a;--accent-hover:#14b8a6;--border:#2d3340;--danger:#f87171;--holiday:#fca5a5;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4)}
    [data-theme="dark"] .task-item.done{background:#14532d;border-color:#166534}
    [data-theme="dark"] .flower-badge{background:#3f1019;border-color:#7f1d1d}
    [data-theme="dark"] .reward-toast{background:#3f1019;border-color:#7f1d1d}
    [data-theme="dark"] .reminder-overdue,[data-theme="dark"] .special-today{background:#422006;border-color:#854d0e}
    [data-theme="dark"] .reminder-toggle.on{background:#422006;border-color:#854d0e;color:#fcd34d}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
    button,input,textarea,select{font-family:inherit;font-size:inherit}button{cursor:pointer;border:none;background:none}
    .app{display:flex;min-height:100vh}.sidebar{width:240px;background:var(--sidebar-bg);color:#e5e7eb;display:flex;flex-direction:column;padding:24px 16px;position:fixed;inset:0 auto 0 0}
    .sidebar-brand{padding:0 12px 24px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px}.sidebar-brand h1{font-size:1.15rem;font-weight:700;color:#fff}.sidebar-brand p{font-size:.75rem;color:var(--text-muted);margin-top:4px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:.9rem;color:#9ca3af;width:100%;text-align:left}.nav-item:hover{background:var(--sidebar-hover);color:#e5e7eb}.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:500}
    .nav-icon{width:24px;text-align:center}.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto}.btn-reset{width:100%;padding:8px;font-size:.8rem;color:var(--text-muted);border-radius:var(--radius-sm)}.btn-reset:hover{background:var(--sidebar-hover);color:#e5e7eb}
    .main{flex:1;margin-left:240px;padding:32px 40px;max-width:960px}.page-header{margin-bottom:28px}.page-header h2{font-size:1.6rem;font-weight:700}.page-header p{color:var(--text-secondary);margin-top:4px;font-size:.9rem}
    .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:16px}
    .card-title{font-size:1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .badge{font-size:.75rem;padding:2px 10px;border-radius:99px;background:var(--accent-light);color:var(--accent)}
    .btn-add{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 14px;font-size:.85rem;color:var(--accent);border:1px dashed var(--accent);border-radius:var(--radius-sm)}.btn-add:hover{background:var(--accent-light)}
    .btn-primary{padding:8px 16px;font-size:.85rem;font-weight:500;color:#fff;background:var(--accent);border-radius:var(--radius-sm)}.btn-primary:hover{background:var(--accent-hover)}
    .btn-danger{padding:6px 12px;font-size:.8rem;color:var(--danger);border:1px solid #fecaca;border-radius:var(--radius-sm)}.btn-danger:hover{background:#fef2f2}
    .inline-input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;outline:none;width:100%}.inline-input:focus{border-color:var(--accent)}
    .empty-hint{text-align:center;padding:32px;color:var(--text-muted);font-size:.9rem}
    .task-header{display:flex;align-items:flex-start;justify-content:space-between}
    .flower-badge{display:flex;align-items:center;gap:6px;font-size:1.4rem;background:#fef2f2;border:1px solid #fecaca;padding:8px 16px;border-radius:99px;color:#e11d48;font-weight:600}
    .date-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
    .date-nav-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:1rem}
    .date-nav-today{padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-weight:500}
    .date-nav-today.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
    .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px}
    .week-day{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);position:relative}
    .week-day.selected{background:var(--accent);border-color:var(--accent);color:#fff}.week-day.today:not(.selected){border-color:var(--accent)}
    .week-day-label{font-size:.7rem;opacity:.8}.week-day-num{font-size:1.1rem;font-weight:600}.week-day-dots{font-size:.65rem;margin-top:2px}.week-day-flower{position:absolute;top:2px;right:4px;font-size:.7rem}
    .task-stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .task-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
    .task-stat-val{display:block;font-size:1.4rem;font-weight:700;color:var(--accent)}.task-stat-label{font-size:.75rem;color:var(--text-secondary)}
    .task-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    .task-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border)}
    .task-item:hover{background:var(--bg)}.task-item.done{background:#f0fdf4;border-color:#bbf7d0}
    .task-item input{width:20px;height:20px;accent-color:var(--accent);margin-top:2px;flex-shrink:0;cursor:pointer}
    .task-item-body{flex:1;display:flex;flex-direction:column;gap:2px}.task-item-title{font-weight:500;font-size:.95rem}
    .task-item.done .task-item-title{text-decoration:line-through;color:var(--text-muted)}
    .task-item-note{font-size:.8rem;color:var(--text-secondary)}.task-ahead-tag{font-size:.7rem;padding:1px 8px;border-radius:99px;background:#fef3c7;color:#d97706;width:fit-content;margin-top:4px}
    .btn-icon{opacity:.5;color:var(--text-muted);font-size:.85rem;padding:2px 6px}.btn-icon:hover{opacity:1;color:var(--danger)}
    .mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:500}
    .mini-cal-nav button{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface)}
    .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .mini-cal-head{text-align:center;font-size:.75rem;color:var(--text-muted);padding:4px}
    .mini-cal-day{aspect-ratio:1;border-radius:var(--radius-sm);border:1px solid transparent;background:var(--bg);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;min-height:44px}
    .cal-solar{font-size:.9rem;font-weight:600;line-height:1.1}.cal-lunar{font-size:.6rem;color:var(--text-muted);line-height:1.1}
    .mini-cal-day.picked .cal-lunar{color:rgba(255,255,255,.85)}.mini-cal-day.picked{background:var(--accent);color:#fff;font-weight:600}.mini-cal-day.today:not(.picked){border-color:var(--accent)}
    .week-day-lunar{font-size:.6rem;opacity:.75;margin-top:1px}.week-day.selected .week-day-lunar{opacity:.9}
    .cal-lunar-range{display:block;font-size:.75rem;font-weight:400;color:var(--text-secondary);margin-top:2px}
    .pick-dates-hint{font-size:.8rem;color:var(--text-secondary);margin-top:8px}
    .reward-history{list-style:none}.reward-history li{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .reward-date{font-weight:500;min-width:100px}.reward-reason{color:var(--text-secondary);flex:1}
    .reward-toast{position:fixed;top:24px;right:24px;z-index:100;background:#fef2f2;border:1px solid #fecaca;color:#e11d48;padding:14px 24px;border-radius:var(--radius);font-weight:500;box-shadow:var(--shadow-md);animation:slideIn .3s ease}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .checklist{list-style:none}.check-item{display:flex;align-items:center;gap:10px;padding:8px 4px}.check-item.done span{text-decoration:line-through;color:var(--text-muted)}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
    .stat-value{font-size:2rem;font-weight:700;color:var(--accent)}.stat-label{font-size:.8rem;color:var(--text-secondary);margin-top:4px}
    .quick-links{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.quick-link{padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-align:center;color:var(--text)}.quick-link:hover{border-color:var(--accent)}
    .progress-bar{height:6px;background:var(--bg);border-radius:99px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:99px}
    @media(max-width:768px){
      .app{flex-direction:column}
      .sidebar{width:100%;height:auto;position:fixed;bottom:0;left:0;right:0;top:auto;flex-direction:row;align-items:center;padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:50;border-top:1px solid rgba(255,255,255,.08)}
      .sidebar-brand{display:none}
      .sidebar nav{display:flex;flex:1;justify-content:space-around;gap:2px;margin-bottom:0}
      .nav-item{flex:1;flex-direction:column;justify-content:center;gap:2px;padding:8px 4px;font-size:.65rem;text-align:center;min-height:48px;position:relative}
      .nav-item .nav-badge{margin-left:0;position:absolute;top:2px;right:calc(50% - 22px)}
      .nav-icon{font-size:1.3rem;width:auto}
      .sidebar-footer{display:none}
      .main{margin-left:0;margin-bottom:calc(64px + env(safe-area-inset-bottom));padding:16px 12px;max-width:none}
      .page-header h2{font-size:1.35rem}
      .date-nav-today{font-size:.8rem;padding:8px 10px;max-width:70vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .week-strip{display:flex;overflow-x:auto;gap:6px;padding-bottom:4px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
      .week-day{flex:0 0 52px;scroll-snap-align:start}
      .task-stats-bar,.stat-grid{grid-template-columns:repeat(3,1fr);gap:8px}
      .task-stat,.stat-card{padding:10px 8px}
      .task-stat-val,.stat-value{font-size:1.15rem}
      .flower-badge{font-size:1.1rem;padding:6px 12px}
      .reward-toast{left:12px;right:12px;top:auto;bottom:calc(72px + env(safe-area-inset-bottom))}
      .mini-cal-day{min-height:48px}
      .btn-primary,.btn-danger,.btn-add,.reminder-toggle{min-height:44px}
    }
    .reminder-settings-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .reminder-toggle{padding:8px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:.85rem;font-weight:500}
    .reminder-toggle.on{background:#fffbeb;border-color:#fde68a;color:#b45309}
    .reminder-settings-btn{padding:8px 14px;font-size:.85rem;color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface)}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem}
    .setting-hint{font-size:.8rem;color:var(--text-secondary);margin:12px 0;line-height:1.5}
    .reminder-overdue{border-color:#fecaca;background:#fef2f2}
    .badge-danger{background:#fee2e2;color:#dc2626}
    .task-overdue{border-color:#fecaca}
    .week-day.has-pending:not(.selected){border-color:#fde68a}
    .week-day-bell{position:absolute;top:2px;right:4px;font-size:.65rem}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:.7rem;font-weight:600;padding:1px 7px;border-radius:99px}
    .reminder-bar{display:block;width:100%;padding:12px 16px;margin-bottom:16px;background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius);color:#b45309;font-size:.9rem;font-weight:500;text-align:left}
    .upcoming-list{list-style:none}.upcoming-list li{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .upcoming-date{font-weight:500;color:var(--accent);min-width:110px;text-align:left}
    .upcoming-tasks{flex:1;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .special-today{border-color:#fde68a;background:linear-gradient(135deg,#fffbeb,#fff)}.special-today-title{font-size:1.2rem;font-weight:700;color:#b45309}.special-today-message{margin-top:8px;font-size:.95rem;color:var(--text-secondary);font-style:italic;line-height:1.6}
    .special-list{list-style:none;display:flex;flex-direction:column;gap:8px}.special-list-item{display:flex;align-items:flex-start;gap:12px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm)}
    .special-list-title{font-weight:600}.special-list-date{font-size:.8rem;color:var(--accent)}.special-list-message{font-size:.85rem;color:var(--text-secondary);margin-top:6px;line-height:1.5}
    .special-message-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;resize:vertical;outline:none;margin-top:8px;line-height:1.5}
    .special-preview-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:.9rem}.special-preview-msg{display:block;font-size:.85rem;color:var(--text-secondary);margin-top:4px}
    .cal-holiday{font-size:.55rem;color:var(--holiday);line-height:1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mini-cal-day.has-holiday:not(.picked) .cal-lunar{color:var(--holiday)}
    .week-day-holiday{font-size:.55rem;color:var(--holiday);margin-top:1px}
    .template-chips,.preset-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .template-chip,.preset-chip{padding:6px 12px;font-size:.8rem;border:1px solid var(--border);border-radius:99px;background:var(--surface);color:var(--text-secondary)}
    .template-chip:hover,.preset-chip:hover{border-color:var(--accent);color:var(--accent)}
    .btn-edit{opacity:.5;font-size:.8rem;padding:2px 6px;color:var(--text-muted)}.btn-edit:hover{opacity:1;color:var(--accent)}
    .trend-chart{display:flex;align-items:flex-end;gap:6px;height:100px;margin-top:8px}
    .trend-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
    .trend-bar-fill{width:100%;background:var(--accent);border-radius:4px 4px 0 0;min-height:4px;opacity:.85}
    .trend-bar-label{font-size:.65rem;color:var(--text-muted)}
    .trend-bar-val{font-size:.7rem;font-weight:600;color:var(--accent)}
    .theme-toggle{width:100%;padding:8px;font-size:.8rem;color:var(--text-muted);border-radius:var(--radius-sm);margin-bottom:8px}
    .theme-toggle:hover{background:var(--sidebar-hover);color:#e5e7eb}
    .toast-undo{margin-left:12px;padding:4px 10px;background:#fff;color:#e11d48;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600}
    [data-theme="dark"] .toast-undo{background:var(--accent);color:#fff}
    .upcoming-special{list-style:none}.upcoming-special li{padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem}
    .upcoming-special-date{font-weight:600;color:var(--accent);font-size:.85rem}
    .upcoming-special-title{font-weight:500;margin-top:2px}
    .upcoming-special-msg{font-size:.8rem;color:var(--text-secondary);margin-top:4px}
    .lunar-tag{font-size:.7rem;padding:2px 8px;border-radius:99px;background:var(--accent-light);color:var(--accent);margin-left:6px}
  </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const STORAGE_KEY='efficiency-handbook-data';
const SETTINGS_KEY='efficiency-handbook-settings';
const TARGET_RATE=0.8;
const SOLAR_HOLIDAYS={'01-01':'元旦','05-01':'劳动','10-01':'国庆'};
const LUNAR_HOLIDAYS={'1-1':'春节','1-15':'元宵','2-2':'龙头','5-5':'端午','7-7':'七夕','8-15':'中秋','9-9':'重阳','12-8':'腊八'};
const TASK_TEMPLATES=[
  {id:'three',label:'📋 每日三件要事',tasks:[{title:'要事一',note:'最重要'},{title:'要事二',note:''},{title:'要事三',note:''}]},
  {id:'morning',label:'🌅 晨间例行',tasks:[{title:'喝水一杯',note:''},{title:'拉伸 5 分钟',note:''},{title:'读 10 分钟',note:''}]},
  {id:'evening',label:'🌙 晚间复盘',tasks:[{title:'回顾今日完成',note:''},{title:'写下明日计划',note:''}]},
];
const uid=()=>crypto.randomUUID();
const todayStr=()=>{const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`};
const getMonthDates=(y,m)=>Array.from({length:new Date(y,m+1,0).getDate()},(_,i)=>{const d=new Date(y,m,i+1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`});
const getWeekDates=a=>{const t=a?new Date(a+'T00:00:00'):new Date(),day=t.getDay(),mon=new Date(t);mon.setDate(t.getDate()-((day+6)%7));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`})};
const shiftDate=(s,n)=>{const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};

    </div>
    <div class="week-strip">${week.map(d=>{const s=getDayStats(data.tasks,d),hasR=data.rewards.dayRewards.some(r=>r.date===d),h=getHoliday(d);
      return`<button class="week-day ${d===selectedDate?'selected':''} ${d===todayStr()?'today':''}" data-date="${d}" onclick="selectedDate='${d}';render()">
        <span class="week-day-label">${weekdayLabel(d)}</span><span class="week-day-num">${d.slice(8)}</span><span class="week-day-lunar">${formatLunarCell(d)}</span>
        ${h?`<span class="week-day-holiday">${h}</span>`:''}
        ${s.total>0?`<span class="week-day-dots">${s.done}/${s.total}</span>`:''}${hasR?'<span class="week-day-flower">🌸</span>':''}</button>`}).join('')}</div>
    <div class="task-stats-bar">
      <div class="task-stat"><span class="task-stat-val">${stats.done}/${stats.total}</span><span class="task-stat-label">当日完成</span></div>
      <div class="task-stat"><span class="task-stat-val">${stats.total?Math.round(stats.rate*100):0}%</span><span class="task-stat-label">完成度</span></div>
      <div class="task-stat"><span class="task-stat-val">${dayReward.flowers}</span><span class="task-stat-label">当日红花</span></div>
    </div>
    <div class="card"><div class="card-title">${selectedDate===todayStr()?'今日任务':formatShortDate(selectedDate)+' 的任务'}<span class="badge">${dayTasks.length} 项</span></div>
      ${dayTasks.length===0?'<p class="empty-hint">这一天还没有任务，点击下方添加</p>':`<ul class="task-list">${dayTasks.map(t=>{
        const done=isCompletedOn(t,selectedDate),comp=t.completions.find(c=>c.scheduledDate===selectedDate),early=done&&comp&&comp.completedDate<selectedDate;
        if(editTaskId===t.id)return`<li class="task-item" style="flex-direction:column;align-items:stretch"><input class="inline-input" style="margin-bottom:8px" value="${editTitle}" oninput="editTitle=this.value" placeholder="任务名称"><input class="inline-input" style="margin-bottom:8px" value="${editNote}" oninput="editNote=this.value" placeholder="备注"><div class="card-title" style="font-size:.85rem">修改日期</div>${miniCalBlock(editCalYear,editCalMonth,editPickDates,true,'editCalMonth--;if(editCalMonth<0){editCalMonth=11;editCalYear--}render()','editCalMonth++;if(editCalMonth>11){editCalMonth=0;editCalYear++}render()','edit')}
        <div style="display:flex;gap:8px;margin-top:8px"><button class="btn-primary" onclick="saveEditTask()">保存</button><button class="btn-danger" onclick="editTaskId=null;render()">取消</button></div></li>`;
        return`<li class="task-item ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="handleToggle('${t.id}','${selectedDate}')">
          <div class="task-item-body"><span class="task-item-title">${t.title}</span>${t.note?`<span class="task-item-note">${t.note}</span>`:''}${early?'<span class="task-ahead-tag">超前完成</span>':''}</div>
          <button class="btn-edit" onclick="startEditTaskById('${t.id}')">编辑</button>
          <button class="btn-icon" onclick="deleteTask('${t.id}')">✕</button></li>`}).join('')}</ul>`}
    </div>
    ${aheadTasks.length?`<div class="card"><div class="card-title">可提前完成<span class="badge">超前有 🌸</span></div><ul class="task-list">${aheadTasks.map(t=>{
      const nd=t.scheduledDates.filter(d=>d>selectedDate&&!isCompletedOn(t,d)).sort()[0];if(!nd)return'';
      return`<li class="task-item"><input type="checkbox" onchange="handleToggle('${t.id}','${nd}')"><div class="task-item-body"><span class="task-item-title">${t.title}</span><span class="task-item-note">原定 ${formatShortDate(nd)}</span></div></li>`}).join('')}</ul></div>`:''}
    ${showForm?`<div class="card"><div class="card-title">新建任务</div>
      <div class="template-chips">${TASK_TEMPLATES.map(t=>`<button class="template-chip" onclick="applyTemplate(TASK_TEMPLATES.find(x=>x.id==='${t.id}'))">${t.label}</button>`).join('')}</div>
      <input class="inline-input" style="margin-bottom:8px" value="${formTitle}" oninput="formTitle=this.value" placeholder="任务名称" autofocus>
      <input class="inline-input" style="margin-bottom:12px" value="${formNote}" oninput="formNote=this.value" placeholder="备注（可选）">
      <div class="card-title" style="font-size:.9rem">选择日期（点击多选）</div>
      ${miniCalBlock(calYear,calMonth,pickDates,true,'calMonth--;if(calMonth<0){calMonth=11;calYear--}render()','calMonth++;if(calMonth>11){calMonth=0;calYear++}render()')}
      ${pickDates.length?`<p class="pick-dates-hint">已选 ${pickDates.length} 天</p>`:''}
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn-primary" onclick="if(formTitle.trim()&&pickDates.length){data.tasks.push({id:uid(),title:formTitle.trim(),note:formNote.trim(),scheduledDates:[...pickDates].sort(),completions:[],createdAt:todayStr()});data.rewards=recalculateRewards(data.tasks);formTitle='';formNote='';pickDates=[selectedDate];showForm=false;save();render()}">创建任务</button>
      <button class="btn-danger" onclick="showForm=false;render()">取消</button></div></div>`
    :`<button class="btn-add" onclick="showForm=true;pickDates=[selectedDate];render()">+ 新建任务</button>`}
    ${data.rewards.dayRewards.length?`<div class="card" style="margin-top:24px"><div class="card-title">红花记录</div><ul class="reward-history">${[...data.rewards.dayRewards].reverse().slice(0,10).map(r=>`<li><span class="reward-date">${formatShortDate(r.date)}</span><span>${'🌸'.repeat(r.flowers)}</span><span class="reward-reason">${r.reasons.join('、')}</span></li>`).join('')}</ul></div>`:''}`;
}

function renderSpecial(){
  const today=todayStr(),sds=data.specialDates||[],todaySp=getSpecialForDate(sds,today);
  const tomorrowSp=data.reminders.specialAdvanceDays===1?getSpecialForDate(sds,shiftDate(today,1)).filter(sd=>!matchesSpecial(sd,today)):[];
  const notifOk='Notification'in window&&Notification.permission==='granted';
  return `${toastHtml()}
    <header class="page-header"><h2>特殊日子</h2><p>生日、纪念日等重要日期，附带一段想说的话</p></header>
    <div class="reminder-settings-bar">
      <button class="reminder-toggle ${data.reminders.enabled?'on':''}" onclick="data.reminders.enabled=!data.reminders.enabled;save();render()">🔔 日期提醒 ${data.reminders.enabled?'开':'关'}</button>
      <button class="reminder-settings-btn" onclick="showSettings=!showSettings;render()">提醒设置</button>
      ${!notifOk?`<button class="btn-primary" style="font-size:.8rem;padding:6px 12px" onclick="Notification.requestPermission().then(()=>render())">允许通知</button>`:''}
    </div>
    ${showSettings?`<div class="card"><div class="card-title">提醒设置</div>
      <div class="setting-row"><label>每日提醒时间</label><input type="time" value="${data.reminders.time}" onchange="data.reminders.time=this.value;data.reminders.lastNotifiedDate=null;save();render()"></div>
      <div class="setting-row"><label><input type="checkbox" ${data.reminders.remindOverdue?'checked':''} onchange="data.reminders.remindOverdue=this.checked;save();render()"> 同时提醒逾期任务</label></div>
      <div class="setting-row"><label>特殊日子提前</label><select onchange="data.reminders.specialAdvanceDays=Number(this.value);save();render()"><option value="0" ${data.reminders.specialAdvanceDays===0?'selected':''}>仅在当天</option><option value="1" ${data.reminders.specialAdvanceDays===1?'selected':''}>提前 1 天</option></select></div>
      <p class="setting-hint">到达设定时间后，推送今天的特殊日子（含寄语）以及逾期任务。</p>
      <button class="btn-add" onclick="const t=todayStr(),o=data.reminders.remindOverdue?getOverdueItems(data.tasks,t):[],s=getSpecialToday(data.specialDates,data.reminders,t);if(!o.length&&!s.length){showToast('今天没有特殊日子，也没有逾期任务')}else if(sendNotify('🔔 提醒（测试）',buildNotifyBody(o,s,t))){showToast('已发送测试通知')}else{showToast('请先允许浏览器通知')}">发送测试提醒</button></div>`:''}
    ${todaySp.length?`<div class="card special-today"><div class="card-title">🎉 今天是</div>${todaySp.map(sd=>`<div class="special-today-item"><div class="special-today-title">${sd.title}</div>${sd.message?`<p class="special-today-message">${sd.message}</p>`:''}</div>`).join('')}</div>`:''}
    ${tomorrowSp.length?`<div class="card"><div class="card-title">明天预告</div>${tomorrowSp.map(sd=>`<div class="special-preview-item"><span class="special-preview-title">${sd.title}</span>${sd.message?`<span class="special-preview-msg">${sd.message}</span>`:''}</div>`).join('')}</div>`:''}
    <div class="card"><div class="card-title">全部特殊日子<span class="badge">${sds.length} 个</span></div>
      ${!sds.length?'<p class="empty-hint">还没有特殊日子，添加生日或纪念日吧</p>':`<ul class="special-list">${[...sds].sort((a,b)=>a.monthDay.localeCompare(b.monthDay)).map(sd=>`<li class="special-list-item"><span class="special-list-icon">${sd.isLunar?'🌙':sd.yearly?'🎂':'📅'}</span><div class="special-list-body"><div class="special-list-title">${sd.title}${sd.isLunar?'<span class="lunar-tag">农历</span>':''}</div><div class="special-list-date">${formatSpecialLabel(sd)}</div>${sd.message?`<p class="special-list-message">${sd.message}</p>`:''}</div><button class="btn-icon" style="opacity:1" onclick="deleteSpecial('${sd.id}')">✕</button></li>`).join('')}</ul>`}
    </div>
    ${showSpecialForm?`<div class="card"><div class="card-title">添加特殊日子</div>
      <input class="inline-input" style="margin-bottom:8px" value="${spTitle}" oninput="spTitle=this.value" placeholder="名称，如：妈妈生日" autofocus>
      <div class="card-title" style="font-size:.9rem;margin-top:4px">选择日期</div>
      ${miniCalBlock(spCalYear,spCalMonth,spDate,false,'spCalMonth--;if(spCalMonth<0){spCalMonth=11;spCalYear--}render()','spCalMonth++;if(spCalMonth>11){spCalMonth=0;spCalYear++}render()','sp')}
      <p class="pick-dates-hint">已选：${spIsLunar?('农历 '+formatLunarMonthDay(lunarMonthDayFromSolar(spDate))+'（参考公历 '+new Date(spDate+'T00:00:00').toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+'）'):formatShortDate(spDate)}</p>
      <label class="setting-row" style="border:none"><input type="checkbox" ${spIsLunar?'checked':''} onchange="spIsLunar=this.checked;render()"> 按农历（如农历生日）</label>
      <label class="setting-row" style="border:none"><input type="checkbox" ${spYearly?'checked':''} onchange="spYearly=this.checked;render()"> 每年重复（如生日、纪念日）</label>
      <textarea class="special-message-input" oninput="spMessage=this.value" placeholder="写一段想说的话，提醒时会一起显示…" rows="3">${spMessage}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn-primary" onclick="if(spTitle.trim()&&spDate){const md=spIsLunar?lunarMonthDayFromSolar(spDate):spDate.slice(5,10),ly=solarToLunar(spDate),y=spIsLunar&&!spYearly?ly.year:parseInt(spDate.slice(0,4));data.specialDates.push({id:uid(),title:spTitle.trim(),message:spMessage.trim(),monthDay:md,yearly:spYearly,year:spYearly?undefined:y,isLunar:spIsLunar});spTitle='';spMessage='';spIsLunar=false;showSpecialForm=false;save();render()}">保存</button><button class="btn-danger" onclick="showSpecialForm=false;render()">取消</button></div></div>`
    :`<button class="btn-add" onclick="showSpecialForm=true;const _d=new Date(spDate+'T00:00:00');spCalYear=_d.getFullYear();spCalMonth=_d.getMonth();render()">+ 添加特殊日子</button>`}`;
}

function renderDashboard(){
  const today=todayStr(),ts=getDayStats(data.tasks,today);
  const weekDays=Array.from({length:7},(_,i)=>shiftDate(today,-6+i));
  const weekStats=weekDays.map(d=>{const s=getDayStats(data.tasks,d);return{date:d,...s,pct:s.total?Math.round(s.rate*100):0}});
  const maxPct=Math.max(...weekStats.map(s=>s.pct),1);
  const recentFlowers=[...data.rewards.dayRewards].reverse().slice(0,7);
  const upcoming=getUpcomingSpecial(data.specialDates||[],today,7).filter(x=>x.daysAway>0);
  return`${toastHtml()}<header class="page-header"><h2>总览</h2><p>${formatDate(new Date())}</p></header>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${ts.done}/${ts.total}</div><div class="stat-label">今日任务</div></div>
      <div class="stat-card"><div class="stat-value">🌸 ${data.rewards.totalFlowers}</div><div class="stat-label">累计小红花</div></div>
      <div class="stat-card"><div class="stat-value">${ts.total?Math.round(ts.rate*100):0}%</div><div class="stat-label">今日完成度</div></div>
    </div>
    <div class="card"><div class="card-title">近 7 日完成率</div><div class="trend-chart">${weekStats.map(s=>`<div class="trend-bar"><span class="trend-bar-val">${s.pct}%</span><div class="trend-bar-fill" style="height:${Math.max(4,s.pct/maxPct*80)}px"></div><span class="trend-bar-label">${s.date.slice(5)}</span></div>`).join('')}</div></div>
    ${recentFlowers.length?`<div class="card"><div class="card-title">近 7 日小红花</div><ul class="reward-history">${recentFlowers.map(r=>`<li><span class="reward-date">${r.date.slice(5)}</span><span>${'🌸'.repeat(r.flowers)}</span><span class="reward-reason">${r.reasons.join('、')}</span></li>`).join('')}</ul></div>`:''}
    ${upcoming.length?`<div class="card"><div class="card-title">即将到来<span class="badge">${upcoming.length}</span></div><ul class="upcoming-special">${upcoming.map(({sd,date,daysAway})=>`<li><div class="upcoming-special-date">${daysAway} 天后 · ${formatShortDate(date)}</div><div class="upcoming-special-title">${sd.title}${sd.isLunar?'<span class="lunar-tag">农历</span>':''}</div>${sd.message?`<div class="upcoming-special-msg">${sd.message}</div>`:''}</li>`).join('')}</ul></div>`:'<div class="card"><div class="card-title">即将到来</div><p class="empty-hint">未来 7 天没有特殊日子</p></div>'}
    <div class="card"><div class="card-title">快捷入口</div><div class="quick-links">
      <button class="quick-link" onclick="page='tasks';render()"><div style="font-size:1.5rem">📌</div><div>今日任务打卡</div></button>
      <button class="quick-link" onclick="page='special';render()"><div style="font-size:1.5rem">🎂</div><div>特殊日子</div></button>
      <button class="quick-link" onclick="settings.darkMode=!settings.darkMode;saveSettings();render()"><div style="font-size:1.5rem">${settings.darkMode?'☀️':'🌙'}</div><div>${settings.darkMode?'浅色模式':'深色模式'}</div></button>
    </div></div>`;
}

const pages={tasks:renderTasks,special:renderSpecial,dashboard:renderDashboard};

function render(){
  try{
  const today=todayStr(),od=getOverdueItems(data.tasks,today).length,sp=getSpecialForDate(data.specialDates||[],today).length,ac=od+sp;
  document.getElementById('app').innerHTML=`
    <aside class="sidebar"><div class="sidebar-brand"><h1>效率手册</h1><p>Personal Efficiency Handbook</p></div>
      <nav>${NAV.map(n=>`<button class="nav-item ${page===n.id?'active':''}" onclick="page='${n.id}';render()"><span class="nav-icon">${n.icon}</span><span>${n.label}</span>${n.id==='special'&&sp>0?`<span class="nav-badge">${sp}</span>`:''}${n.id==='tasks'&&od>0?`<span class="nav-badge">${od}</span>`:''}</button>`).join('')}</nav>
      <div class="sidebar-footer"><button class="theme-toggle" onclick="settings.darkMode=!settings.darkMode;saveSettings();render()">${settings.darkMode?'☀️ 浅色模式':'🌙 深色模式'}</button><button class="btn-reset" onclick="if(confirm('恢复默认？')){data=defaultData();save();render()}">恢复默认数据</button></div>
    </aside><main class="main">${ac>0&&page!=='tasks'&&page!=='special'?`<button class="reminder-bar" onclick="page='special';render()">🔔 ${sp>0?getSpecialForDate(data.specialDates,today).map(s=>s.title).join('、'):''}${sp>0&&od>0?' · ':''}${od>0?`逾期 ${od} 项任务`:''}</button>`:''}${(pages[page]||renderTasks)()}</main>`;
  if(page==='tasks')scrollWeekToToday();
  }catch(e){console.error(e);document.getElementById('app').innerHTML=`<div style="padding:40px"><h2>加载出错</h2><p style="color:#dc2626">${e.message}</p><button class="btn-primary" onclick="localStorage.removeItem('${STORAGE_KEY}');location.reload()">清除数据并重试</button></div>`}
}
document.documentElement.setAttribute('data-theme',settings.darkMode?'dark':'light');
saveSettings();
render();
tryNotify();
setInterval(tryNotify,60000);
</script>
</body>
</html>
