<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="个人效率手册 — 任务打卡、特殊日子提醒、农历日历" />
  <link rel="manifest" href="manifest.json" />
  <title>个人效率手册</title>
  <style>
    :root{
      --bg:#eef2f6;--bg-grad:linear-gradient(165deg,#e6f7f5 0%,#f5f0ea 45%,#eef2f6 100%);
      --surface:rgba(255,255,255,.92);--surface-solid:#fff;
      --sidebar-bg:linear-gradient(180deg,#1a2332 0%,#121820 100%);
      --sidebar-hover:rgba(255,255,255,.06);--sidebar-active:rgba(20,184,166,.18);
      --text:#1e293b;--text-secondary:#64748b;--text-muted:#94a3b8;
      --accent:#0d9488;--accent-2:#14b8a6;--accent-light:#ccfbf1;--accent-hover:#0f766e;
      --accent-grad:linear-gradient(135deg,#2dd4bf,#0d9488);
      --flower-grad:linear-gradient(135deg,#fb7185,#e11d48);
      --purple-bg:#ede9fe;--purple-text:#7c3aed;
      --border:rgba(148,163,184,.22);--danger:#ef4444;--holiday:#dc2626;
      --radius:16px;--radius-sm:10px;--radius-lg:20px;
      --shadow:0 1px 2px rgba(15,23,42,.04),0 4px 16px rgba(15,23,42,.06);
      --shadow-md:0 8px 30px rgba(15,23,42,.1);
      --shadow-accent:0 4px 14px rgba(13,148,136,.28);
      --font:system-ui,-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"]{
      --bg:#0b0e14;--bg-grad:linear-gradient(165deg,#0a1218 0%,#10141f 50%,#0b0e14 100%);
      --surface:rgba(22,27,38,.88);--surface-solid:#161b26;
      --sidebar-bg:linear-gradient(180deg,#080a0f 0%,#0e1118 100%);
      --sidebar-hover:rgba(255,255,255,.05);--sidebar-active:rgba(45,212,191,.15);
      --text:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;
      --accent:#2dd4bf;--accent-2:#5eead4;--accent-light:rgba(20,83,75,.45);--accent-hover:#14b8a6;
      --accent-grad:linear-gradient(135deg,#5eead4,#0d9488);
      --flower-grad:linear-gradient(135deg,#fb7185,#be123c);
      --purple-bg:rgba(91,33,182,.25);--purple-text:#c4b5fd;
      --border:rgba(148,163,184,.12);
      --shadow:0 1px 2px rgba(0,0,0,.2),0 4px 16px rgba(0,0,0,.25);
      --shadow-md:0 8px 30px rgba(0,0,0,.35);
      --shadow-accent:0 4px 14px rgba(45,212,191,.2);
    }
    [data-theme="dark"] .task-item.done{background:rgba(20,83,45,.35);border-color:rgba(34,197,94,.35)}
    [data-theme="dark"] .flower-badge{box-shadow:0 4px 16px rgba(190,18,60,.3)}
    [data-theme="dark"] .reward-toast{background:rgba(63,16,25,.95);border-color:#7f1d1d}
    [data-theme="dark"] .reminder-overdue,[data-theme="dark"] .special-today{background:rgba(66,32,6,.5);border-color:rgba(133,77,14,.5)}
    [data-theme="dark"] .reminder-toggle.on{background:rgba(66,32,6,.6);border-color:#854d0e;color:#fcd34d}
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-tap-highlight-color:transparent}
    body{font-family:var(--font);background:var(--bg-grad);background-attachment:fixed;color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
    button,input,textarea,select{font-family:inherit;font-size:inherit}
    button{cursor:pointer;border:none;background:none;transition:transform .15s var(--ease),opacity .15s var(--ease)}
    button:active{transform:scale(.97)}
    .app{display:flex;min-height:100vh}
    .sidebar{width:248px;background:var(--sidebar-bg);color:#e2e8f0;display:flex;flex-direction:column;padding:28px 14px 20px;position:fixed;inset:0 auto 0 0;box-shadow:4px 0 24px rgba(0,0,0,.12)}
    .sidebar-brand{padding:4px 14px 28px;margin-bottom:8px}
    .sidebar-brand h1{font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
    .sidebar-brand h1::before{content:'✦';font-size:.85rem;color:var(--accent-2);opacity:.9}
    .sidebar-brand p{font-size:.72rem;color:#64748b;margin-top:6px;letter-spacing:.02em}
    .sidebar nav{display:flex;flex-direction:column;gap:4px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);font-size:.88rem;color:#94a3b8;width:100%;text-align:left;transition:all .2s var(--ease);position:relative}
    .nav-item:hover{background:var(--sidebar-hover);color:#f1f5f9}
    .nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:600;box-shadow:inset 0 0 0 1px rgba(45,212,191,.25)}
    .nav-item.active .nav-icon{transform:scale(1.08)}
    .nav-icon{width:26px;text-align:center;font-size:1.15rem;transition:transform .2s var(--ease)}
    .sidebar-footer{padding:14px 8px 0;margin-top:auto;border-top:1px solid rgba(255,255,255,.06)}
    .btn-reset{width:100%;padding:10px;font-size:.78rem;color:#64748b;border-radius:var(--radius-sm);transition:all .2s}
    .btn-reset:hover{background:var(--sidebar-hover);color:#e2e8f0}
    .main{flex:1;margin-left:248px;padding:28px 36px 40px;max-width:920px;animation:fadeUp .35s var(--ease)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .page-header{margin-bottom:24px}
    .page-header h2{font-size:1.75rem;font-weight:800;letter-spacing:-.03em;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    [data-theme="dark"] .page-header h2{-webkit-text-fill-color:transparent}
    .page-header p{color:var(--text-secondary);margin-top:6px;font-size:.9rem}
    .card{background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:14px;transition:box-shadow .2s var(--ease)}
    .card:hover{box-shadow:var(--shadow-md)}
    .card-title{font-size:.95rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.01em}
    .badge{font-size:.72rem;padding:3px 11px;border-radius:99px;background:var(--accent-light);color:var(--accent);font-weight:600}
    .btn-add{display:inline-flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:10px 18px;font-size:.85rem;font-weight:500;color:var(--accent);border:1.5px dashed rgba(13,148,136,.45);border-radius:var(--radius-sm);width:100%;transition:all .2s}
    .btn-add:hover{background:var(--accent-light);border-style:solid}
    .btn-primary{padding:10px 18px;font-size:.85rem;font-weight:600;color:#fff;background:var(--accent-grad);border-radius:var(--radius-sm);box-shadow:var(--shadow-accent);transition:all .2s}
    .btn-primary:hover{filter:brightness(1.05);box-shadow:0 6px 20px rgba(13,148,136,.35)}
    .btn-danger{padding:8px 14px;font-size:.8rem;font-weight:500;color:var(--danger);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius-sm);background:rgba(254,242,242,.6);transition:all .2s}
    [data-theme="dark"] .btn-danger{background:rgba(127,29,29,.2)}
    .btn-danger:hover{background:rgba(254,226,226,.9)}
    .inline-input{border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;outline:none;width:100%;background:var(--surface-solid);transition:border-color .2s,box-shadow .2s}
    .inline-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.15)}
    .empty-hint{text-align:center;padding:36px 16px;color:var(--text-muted);font-size:.9rem}
    .task-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .flower-badge{display:flex;align-items:center;gap:6px;font-size:1.35rem;background:var(--flower-grad);padding:10px 18px;border-radius:99px;color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(225,29,72,.25);border:none}
    .date-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px}
    .date-nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface-solid);font-size:1rem;box-shadow:var(--shadow);transition:all .2s}
    .date-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
    .date-nav-today{padding:10px 18px;border-radius:99px;border:1px solid var(--border);background:var(--surface-solid);font-weight:600;font-size:.88rem;box-shadow:var(--shadow);max-width:75vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .date-nav-today.active{border-color:transparent;background:var(--accent-grad);color:#fff;box-shadow:var(--shadow-accent)}
    .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
    .week-day{display:flex;flex-direction:column;align-items:center;padding:12px 4px;border-radius:var(--radius-sm);border:1px solid transparent;background:var(--surface-solid);position:relative;box-shadow:var(--shadow);transition:all .2s var(--ease)}
    .week-day.selected{background:var(--accent-grad);border-color:transparent;color:#fff;box-shadow:var(--shadow-accent);transform:translateY(-2px)}
    .week-day.today:not(.selected){border-color:var(--accent);box-shadow:0 0 0 2px rgba(13,148,136,.15)}
    .week-day-label{font-size:.68rem;opacity:.85;font-weight:500}.week-day-num{font-size:1.15rem;font-weight:700;margin-top:2px}
    .week-day-dots{font-size:.62rem;margin-top:3px;opacity:.9}.week-day-flower{position:absolute;top:4px;right:5px;font-size:.65rem}
    .task-stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
    .task-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 10px;text-align:center;box-shadow:var(--shadow)}
    .task-stat-val{display:block;font-size:1.45rem;font-weight:800;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .task-stat-label{font-size:.72rem;color:var(--text-secondary);margin-top:4px;font-weight:500}
    .task-list{list-style:none;display:flex;flex-direction:column;gap:8px}
    .task-item{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-solid);transition:all .2s var(--ease)}
    .task-item:hover{border-color:rgba(13,148,136,.3);box-shadow:var(--shadow)}
    .task-item.done{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-color:rgba(34,197,94,.25)}
    .task-item input{width:22px;height:22px;accent-color:var(--accent);margin-top:1px;flex-shrink:0;cursor:pointer;border-radius:6px}
    .task-item-body{flex:1;display:flex;flex-direction:column;gap:3px}
    .task-item-title{font-weight:600;font-size:.92rem;letter-spacing:-.01em}
    .task-item.done .task-item-title{text-decoration:line-through;color:var(--text-muted);font-weight:500}
    .task-item-note{font-size:.8rem;color:var(--text-secondary)}
    .task-ahead-tag{font-size:.68rem;padding:2px 9px;border-radius:99px;background:#fef3c7;color:#b45309;font-weight:600;width:fit-content;margin-top:4px}
    .btn-icon{opacity:.45;color:var(--text-muted);font-size:.85rem;padding:4px 8px;border-radius:6px;transition:all .15s}
    .btn-icon:hover{opacity:1;color:var(--danger);background:rgba(239,68,68,.08)}
    .mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-weight:600;font-size:.9rem}
    .mini-cal-nav button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface-solid);box-shadow:var(--shadow)}
    .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
    .mini-cal-head{text-align:center;font-size:.72rem;color:var(--text-muted);padding:4px;font-weight:600}
    .mini-cal-day{aspect-ratio:1;border-radius:var(--radius-sm);border:1px solid transparent;background:var(--bg);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;min-height:44px;transition:all .15s}
    .mini-cal-day:hover{background:var(--accent-light)}
    .cal-solar{font-size:.88rem;font-weight:700;line-height:1.1}.cal-lunar{font-size:.58rem;color:var(--text-muted);line-height:1.1}
    .mini-cal-day.picked .cal-lunar{color:rgba(255,255,255,.9)}.mini-cal-day.picked{background:var(--accent-grad);color:#fff;box-shadow:var(--shadow-accent)}
    .mini-cal-day.today:not(.picked){border-color:var(--accent);background:var(--accent-light)}
    .week-day-lunar{font-size:.58rem;opacity:.8;margin-top:2px}.week-day.selected .week-day-lunar{opacity:.95}
    .cal-lunar-range{display:block;font-size:.72rem;font-weight:400;color:var(--text-secondary);margin-top:2px}
    .pick-dates-hint{font-size:.8rem;color:var(--text-secondary);margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm)}
    .reward-history{list-style:none}.reward-history li{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .reward-date{font-weight:600;min-width:88px;color:var(--text-secondary)}.reward-reason{color:var(--text-secondary);flex:1}
    .reward-toast{position:fixed;top:20px;right:20px;z-index:200;background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:1px solid #fecdd3;color:#be123c;padding:14px 20px;border-radius:var(--radius);font-weight:600;box-shadow:var(--shadow-md);animation:toastIn .35s var(--ease)}
    @keyframes toastIn{from{transform:translateY(-12px) scale(.96);opacity:0}to{transform:none;opacity:1}}
    .checklist{list-style:none}.check-item{display:flex;align-items:center;gap:10px;padding:8px 4px}.check-item.done span{text-decoration:line-through;color:var(--text-muted)}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);padding:20px 12px;text-align:center;box-shadow:var(--shadow);transition:transform .2s var(--ease)}
    .stat-card:hover{transform:translateY(-2px)}
    .stat-value{font-size:1.85rem;font-weight:800;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-label{font-size:.75rem;color:var(--text-secondary);margin-top:6px;font-weight:500}
    .quick-links{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .quick-link{padding:18px 10px;background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);text-align:center;color:var(--text);box-shadow:var(--shadow);transition:all .2s var(--ease)}
    .quick-link:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md)}
    .quick-link div:first-child{font-size:1.6rem;margin-bottom:6px}
    .progress-bar{height:8px;background:var(--bg);border-radius:99px;overflow:hidden}.progress-fill{height:100%;background:var(--accent-grad);border-radius:99px}
    .reminder-settings-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .reminder-toggle{padding:9px 18px;border-radius:99px;border:1px solid var(--border);background:var(--surface-solid);font-size:.85rem;font-weight:600;box-shadow:var(--shadow);transition:all .2s}
    .reminder-toggle.on{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fcd34d;color:#b45309}
    .reminder-settings-btn{padding:9px 16px;font-size:.85rem;color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-solid);font-weight:500}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:.9rem;gap:12px}
    .setting-hint{font-size:.8rem;color:var(--text-secondary);margin:12px 0;line-height:1.6;padding:12px 14px;background:var(--bg);border-radius:var(--radius-sm)}
    .reminder-overdue{border-color:rgba(239,68,68,.25);background:linear-gradient(135deg,#fef2f2,#fff)}
    .badge-danger{background:#fee2e2;color:#dc2626;font-weight:600}
    .task-overdue{border-color:rgba(239,68,68,.2)}
    .nav-badge{margin-left:auto;background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:99px;box-shadow:0 2px 8px rgba(239,68,68,.35)}
    .reminder-bar{display:block;width:100%;padding:14px 18px;margin-bottom:14px;background:linear-gradient(135deg,#fffbeb,#fef9c3);border:1px solid #fde68a;border-radius:var(--radius);color:#b45309;font-size:.88rem;font-weight:600;text-align:left;box-shadow:var(--shadow)}
    .special-today{border-color:#fde68a;background:linear-gradient(135deg,#fffbeb 0%,#fff 60%,#fef3c7 100%);box-shadow:var(--shadow)}
    .special-today-title{font-size:1.2rem;font-weight:800;color:#b45309;letter-spacing:-.02em}
    .special-today-message{margin-top:8px;font-size:.92rem;color:var(--text-secondary);font-style:italic;line-height:1.65}
    .special-list{list-style:none;display:flex;flex-direction:column;gap:10px}
    .special-list-item{display:flex;align-items:flex-start;gap:12px;padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-solid);transition:all .2s}
    .special-list-item:hover{border-color:rgba(13,148,136,.25);box-shadow:var(--shadow)}
    .special-list-title{font-weight:700}.special-list-date{font-size:.8rem;color:var(--accent);font-weight:600;margin-top:2px}
    .special-list-message{font-size:.85rem;color:var(--text-secondary);margin-top:6px;line-height:1.55}
    .special-message-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;resize:vertical;outline:none;margin-top:8px;line-height:1.55;background:var(--surface-solid)}
    .special-message-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
    .special-preview-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:.9rem}
    .cal-holiday{font-size:.52rem;color:var(--holiday);font-weight:600;line-height:1}
    .mini-cal-day.has-holiday:not(.picked) .cal-lunar{color:var(--holiday)}
    .week-day-holiday{font-size:.52rem;color:var(--holiday);font-weight:600;margin-top:1px}
    .template-chips,.preset-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .template-chip,.preset-chip{padding:8px 14px;font-size:.8rem;font-weight:500;border:1px solid var(--border);border-radius:99px;background:var(--surface-solid);color:var(--text-secondary);box-shadow:var(--shadow);transition:all .2s}
    .template-chip:hover,.preset-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
    .btn-edit{font-size:.78rem;padding:4px 10px;color:var(--text-muted);border-radius:6px;font-weight:500;transition:all .15s}
    .btn-edit:hover{color:var(--accent);background:var(--accent-light)}
    .trend-chart{display:flex;align-items:flex-end;gap:8px;height:110px;margin-top:12px;padding-top:8px}
    .trend-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
    .trend-bar-fill{width:72%;max-width:36px;background:var(--accent-grad);border-radius:8px 8px 4px 4px;min-height:6px;box-shadow:var(--shadow-accent);transition:height .3s var(--ease)}
    .trend-bar-label{font-size:.62rem;color:var(--text-muted);font-weight:500}
    .trend-bar-val{font-size:.68rem;font-weight:700;color:var(--accent)}
    .theme-toggle{width:100%;padding:10px;font-size:.8rem;color:#94a3b8;border-radius:var(--radius-sm);margin-bottom:8px;font-weight:500}
    .theme-toggle:hover{background:var(--sidebar-hover);color:#f1f5f9}
    .toast-undo{margin-left:12px;padding:5px 12px;background:#fff;color:#e11d48;border-radius:99px;font-size:.78rem;font-weight:700;box-shadow:var(--shadow)}
    [data-theme="dark"] .toast-undo{background:var(--accent-grad);color:#fff}
    .upcoming-special{list-style:none}.upcoming-special li{padding:12px 0;border-bottom:1px solid var(--border)}
    .upcoming-special-date{font-weight:700;color:var(--accent);font-size:.82rem}
    .lunar-tag{font-size:.68rem;padding:2px 9px;border-radius:99px;background:var(--accent-light);color:var(--accent);font-weight:600}
    .repeat-tag{font-size:.68rem;padding:2px 9px;border-radius:99px;background:var(--purple-bg);color:var(--purple-text);font-weight:600}
    .weekday-chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
    .weekday-chip{padding:8px 12px;font-size:.8rem;font-weight:500;border:1px solid var(--border);border-radius:99px;background:var(--surface-solid);color:var(--text-secondary);transition:all .15s}
    .weekday-chip.on{background:var(--accent-grad);border-color:transparent;color:#fff;box-shadow:var(--shadow-accent)}

function lLeapM(y){return LUNAR_INFO[y-1900]&0xf}

const weekdayLabel=s=>new Date(s+'T00:00:00').toLocaleDateString('zh-CN',{weekday:'short'});
const formatShortDate=s=>{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'})+'（'+formatLunarFull(s)+'）'};

function isCompletedOn(t,d){return t.completions.some(c=>c.scheduledDate===d)}
function taskAppliesOnDate(t,d){
  if(t.scheduledDates&&t.scheduledDates.includes(d))return true;
  const r=t.recurrence;if(!r)return false;
  if(d<r.start)return false;
  if(r.end&&d>r.end)return false;
  if(r.type==='daily')return true;
  if(r.type==='weekly')return(r.days||[]).includes(weekdayIndex(d));
  if(r.type==='monthly')return parseInt(d.slice(8),10)===(r.day||parseInt(r.start.slice(8),10));
  return false;
}
function getTasksForDate(tasks,d){return tasks.filter(t=>taskAppliesOnDate(t,d))}
function getNextOccurrence(t,after){for(let i=1;i<=366;i++){const d=shiftDate(after,i);if(taskAppliesOnDate(t,d)&&!isCompletedOn(t,d))return d}return null}
function formatRecurrence(t){
  const r=t.recurrence;if(!r)return'';
  if(r.type==='daily')return'每天';
  if(r.type==='weekly')return'每周'+((r.days||[]).sort((a,b)=>a-b).map(i=>'周'+WEEKDAY_NAMES[i]).join(''));

  return'';

function collectDatesForTasks(tasks,to){
  const dates=new Set(),from=tasks.reduce((m,t)=>{const s=t.recurrence?.start||t.scheduledDates?.[0]||to;return s<m?s:m},to);

  return dates;

function getDayStats(tasks,d){const day=getTasksForDate(tasks,d),total=day.length,done=day.filter(t=>isCompletedOn(t,d)).length,rate=total?done/total:0,ahead=tasks.filter(t=>{const n=getNextOccurrence(t,d);return n&&n>d&&t.completions.some(c=>c.scheduledDate===n&&c.completedDate===d)}).length;return{total,done,rate,ahead}}

function recalculateRewards(tasks){const today=todayStr(),dates=collectDatesForTasks(tasks,shiftDate(today,7));const dayRewards=[...dates].sort().map(d=>evaluateDayReward(tasks,d)).filter(r=>r.flowers>0);return{totalFlowers:dayRewards.reduce((s,r)=>s+r.flowers,0),dayRewards}}

function getOverdueItems(tasks,today){const items=[];tasks.forEach(t=>{
  if(t.recurrence){let d=t.recurrence.start;while(d<today){if(taskAppliesOnDate(t,d)&&!isCompletedOn(t,d))items.push({task:t,scheduledDate:d});d=shiftDate(d,1)}}

function toMonthDay(d){return d.slice(5,10)}

function getUpcomingSpecial(sds,today,days=7){const res=[];for(let i=0;i<=days;i++){const d=shiftDate(today,i);getSpecialForDate(sds,d).forEach(sd=>{if(!res.some(x=>x.sd.id===sd.id&&x.date===d))res.push({sd,date:d,daysAway:i})})}return res.sort((a,b)=>a.date.localeCompare(b.date))}
function getSpecialToday(sds,r,today){const res=getSpecialForDate(sds,today);if(r.specialAdvanceDays===1)getSpecialForDate(sds,shiftDate(today,1)).forEach(sd=>{if(!res.some(x=>x.id===sd.id))res.push(sd)});return res}
function formatSpecialLabel(sd){
  if(sd.isLunar){const[lm,ld]=sd.monthDay.split('-').map(Number),lmd=formatLunarMonthDay(sd.monthDay),cy=new Date().getFullYear(),solar=findSolarForLunar(lm,ld,cy);const base=sd.yearly?`每年农历 ${lmd}`:`${sd.year} 年农历 ${lmd}`;return solar?`${base}（今年 ${new Date(solar+'T00:00:00').toLocaleDateString('zh-CN',{month:'long',day:'numeric'})}）`:base}
  const[mm,dd]=sd.monthDay.split('-'),y=sd.yearly?new Date().getFullYear():(sd.year||new Date().getFullYear()),solar=sd.yearly?`每年 ${parseInt(mm)} 月 ${parseInt(dd)} 日`:`${sd.year} 年 ${parseInt(mm)} 月 ${parseInt(dd)} 日`;return solar+'（'+formatLunarFull(`${y}-${sd.monthDay}`)+'）'}
function buildNotifyBody(overdue,special,today){const p=[];special.forEach(sd=>{const isT=matchesSpecial(sd,today);p.push(`${isT?'🎂':'📅 明天'} ${sd.title}${sd.message?'：'+sd.message:''}`)});if(overdue.length)p.push(`⚠️ 逾期 ${overdue.length} 项：`+overdue.map(i=>i.task.title).join('、'));return p.join('\n')||'暂无提醒'}
function shouldNotifyNow(r){if(!r.enabled)return false;const today=todayStr();if(r.lastNotifiedDate===today)return false;const[h,m]=r.time.split(':').map(Number);const now=new Date();return now.getHours()*60+now.getMinutes()>=h*60+m}
function sendNotify(title,body,tag='efficiency-handbook-reminder'){if(!('Notification'in window)||Notification.permission!=='granted')return false;try{new Notification(title,{body,tag});return true}catch{return false}}
function tryNotify(){if(!shouldNotifyNow(data.reminders))return;const today=todayStr(),overdue=data.reminders.remindOverdue?getOverdueItems(data.tasks,today):[],special=getSpecialToday(data.specialDates||[],data.reminders,today);if(!overdue.length&&!special.length)return;sendNotify('🔔 效率手册提醒',buildNotifyBody(overdue,special,today));data.reminders.lastNotifiedDate=today;save()}
function formatIntervalMin(m){if(m<60)return`每 ${m} 分钟`;if(m%60===0)return`每 ${m/60} 小时`;return`每 ${m} 分钟`}

  const prevFlowers=(data.rewards.dayRewards.find(r=>r.date===selectedDate)||{}).flowers||0;

      <div class="setting-row"><label>特殊日子提前</label><select onchange="data.reminders.specialAdvanceDays=Number(this.value);save();render()"><option value="0" ${data.reminders.specialAdvanceDays===0?'selected':''}>仅在当天</option><option value="1" ${data.reminders.specialAdvanceDays===1?'selected':''}>提前 1 天</option></select></div>
      <p class="setting-hint">到达设定时间后，推送今天的特殊日子（含寄语）以及逾期任务。</p>
      <button class="btn-add" onclick="const t=todayStr(),o=data.reminders.remindOverdue?getOverdueItems(data.tasks,t):[],s=getSpecialToday(data.specialDates,data.reminders,t);if(!o.length&&!s.length){showToast('今天没有特殊日子，也没有逾期任务')}else if(sendNotify('🔔 提醒（测试）',buildNotifyBody(o,s,t))){showToast('已发送测试通知')}else{showToast('请先允许浏览器通知')}">发送测试提醒</button></div>`:''}
    ${todaySp.length?`<div class="card special-today"><div class="card-title">🎉 今天是</div>${todaySp.map(sd=>`<div class="special-today-item"><div class="special-today-title">${sd.title}</div>${sd.message?`<p class="special-today-message">${sd.message}</p>`:''}</div>`).join('')}</div>`:''}
    ${tomorrowSp.length?`<div class="card"><div class="card-title">明天预告</div>${tomorrowSp.map(sd=>`<div class="special-preview-item"><span class="special-preview-title">${sd.title}</span>${sd.message?`<span class="special-preview-msg">${sd.message}</span>`:''}</div>`).join('')}</div>`:''}
    <div class="card"><div class="card-title">全部特殊日子<span class="badge">${sds.length} 个</span></div>
      ${!sds.length?'<p class="empty-hint">还没有特殊日子，添加生日或纪念日吧</p>':`<ul class="special-list">${[...sds].sort((a,b)=>a.monthDay.localeCompare(b.monthDay)).map(sd=>`<li class="special-list-item"><span class="special-list-icon">${sd.isLunar?'🌙':sd.yearly?'🎂':'📅'}</span><div class="special-list-body"><div class="special-list-title">${sd.title}${sd.isLunar?'<span class="lunar-tag">农历</span>':''}</div><div class="special-list-date">${formatSpecialLabel(sd)}</div>${sd.message?`<p class="special-list-message">${sd.message}</p>`:''}</div><button class="btn-icon" style="opacity:1" onclick="deleteSpecial('${sd.id}')">✕</button></li>`).join('')}</ul>`}
    </div>
    ${showSpecialForm?`<div class="card"><div class="card-title">添加特殊日子</div>
      <input class="inline-input" style="margin-bottom:8px" value="${spTitle}" oninput="spTitle=this.value" placeholder="名称，如：妈妈生日" autofocus>
      <div class="card-title" style="font-size:.9rem;margin-top:4px">选择日期</div>
      ${miniCalBlock(spCalYear,spCalMonth,spDate,false,'spCalMonth--;if(spCalMonth<0){spCalMonth=11;spCalYear--}render()','spCalMonth++;if(spCalMonth>11){spCalMonth=0;spCalYear++}render()','sp')}
      <p class="pick-dates-hint">已选：${spIsLunar?('农历 '+formatLunarMonthDay(lunarMonthDayFromSolar(spDate))+'（参考公历 '+new Date(spDate+'T00:00:00').toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+'）'):formatShortDate(spDate)}</p>
      <label class="setting-row" style="border:none"><input type="checkbox" ${spIsLunar?'checked':''} onchange="spIsLunar=this.checked;render()"> 按农历（如农历生日）</label>
      <label class="setting-row" style="border:none"><input type="checkbox" ${spYearly?'checked':''} onchange="spYearly=this.checked;render()"> 每年重复（如生日、纪念日）</label>
      <textarea class="special-message-input" oninput="spMessage=this.value" placeholder="写一段想说的话，提醒时会一起显示…" rows="3">${spMessage}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn-primary" onclick="if(spTitle.trim()&&spDate){const md=spIsLunar?lunarMonthDayFromSolar(spDate):spDate.slice(5,10),ly=solarToLunar(spDate),y=spIsLunar&&!spYearly?ly.year:parseInt(spDate.slice(0,4));data.specialDates.push({id:uid(),title:spTitle.trim(),message:spMessage.trim(),monthDay:md,yearly:spYearly,year:spYearly?undefined:y,isLunar:spIsLunar});spTitle='';spMessage='';spIsLunar=false;showSpecialForm=false;save();render()}">保存</button><button class="btn-danger" onclick="showSpecialForm=false;render()">取消</button></div></div>`
    :`<button class="btn-add" onclick="showSpecialForm=true;const _d=new Date(spDate+'T00:00:00');spCalYear=_d.getFullYear();spCalMonth=_d.getMonth();render()">+ 添加特殊日子</button>`}`;
}

function renderIntervals(){
  const ivs=data.intervalReminders||[],notifOk='Notification'in window&&Notification.permission==='granted';
  return`${toastHtml()}
    <header class="page-header"><h2>定时提醒</h2><p>按时间周期重复提醒，如喝水、护眼、起来活动</p></header>
    <div class="reminder-settings-bar">
      ${!notifOk?`<button class="btn-primary" style="font-size:.8rem;padding:6px 12px" onclick="Notification.requestPermission().then(()=>render())">允许通知</button>`:'<span class="setting-hint" style="margin:0">✅ 通知已开启</span>'}
      <button class="btn-add" style="margin:0" onclick="const iv=data.intervalReminders[0];if(iv&&sendNotify('⏰ 测试提醒',iv.message||iv.title,'efficiency-interval-test')){showToast('已发送测试通知')}else{showToast('请先添加提醒并允许通知')}">测试通知</button>
    </div>
    <div class="card"><p class="setting-hint">在设定的时段内，每隔一段时间推送提醒。请允许浏览器通知；添加到主屏幕后体验更好。页面关闭后 iOS 可能无法准时提醒。</p></div>
    <div class="card"><div class="card-title">我的定时提醒<span class="badge">${ivs.length} 个</span></div>
      ${!ivs.length?'<p class="empty-hint">还没有定时提醒，添加一个吧</p>':`<ul class="interval-list">${ivs.map(iv=>`<li class="interval-item ${iv.enabled?'':'off'}"><button class="interval-toggle ${iv.enabled?'on':''}" onclick="const x=data.intervalReminders.find(i=>i.id==='${iv.id}');x.enabled=!x.enabled;if(!x.enabled)x.lastNotifiedAt=null;save();render()">${iv.enabled?'开':'关'}</button><div class="interval-item-body"><div class="interval-item-title">⏰ ${iv.title}<span class="repeat-tag">${formatIntervalMin(iv.intervalMinutes)}</span></div><div class="interval-meta">${iv.startTime} – ${iv.endTime}${iv.message?` · ${iv.message}`:''}</div><div class="interval-next">${getNextIntervalLabel(iv)}</div></div><button class="btn-icon" style="opacity:1" onclick="deleteInterval('${iv.id}')">✕</button></li>`).join('')}</ul>`}
    </div>
    ${showIntervalForm?`<div class="card"><div class="card-title">添加定时提醒</div>
      <div class="template-chips">${INTERVAL_PRESETS.map(p=>`<button class="template-chip" onclick="applyIntervalPreset(INTERVAL_PRESETS.find(x=>x.id==='${p.id}'))">${p.label}</button>`).join('')}</div>
      <input class="inline-input" style="margin-bottom:8px" value="${ivTitle}" oninput="ivTitle=this.value" placeholder="提醒名称，如：喝水" autofocus>
      <input class="inline-input" style="margin-bottom:8px" value="${ivMessage}" oninput="ivMessage=this.value" placeholder="提醒内容（可选）">
      <div class="setting-row"><label>提醒间隔</label><select class="recurrence-select" style="width:auto;margin:0" onchange="ivMinutes=Number(this.value);render()">
        <option value="15" ${ivMinutes===15?'selected':''}>每 15 分钟</option>
        <option value="30" ${ivMinutes===30?'selected':''}>每 30 分钟</option>
        <option value="45" ${ivMinutes===45?'selected':''}>每 45 分钟</option>
        <option value="60" ${ivMinutes===60?'selected':''}>每 1 小时</option>
        <option value="90" ${ivMinutes===90?'selected':''}>每 1.5 小时</option>
        <option value="120" ${ivMinutes===120?'selected':''}>每 2 小时</option>
        <option value="180" ${ivMinutes===180?'selected':''}>每 3 小时</option>
      </select></div>
      <div class="setting-row"><label>开始时间</label><input type="time" value="${ivStart}" onchange="ivStart=this.value;render()"></div>
      <div class="setting-row"><label>结束时间</label><input type="time" value="${ivEnd}" onchange="ivEnd=this.value;render()"></div>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn-primary" onclick="saveInterval()">保存</button><button class="btn-danger" onclick="showIntervalForm=false;render()">取消</button></div></div>`
    :`<button class="btn-add" onclick="showIntervalForm=true;render()">+ 添加定时提醒</button>`}`;
}

function renderDashboard(){
  const today=todayStr(),ts=getDayStats(data.tasks,today);
  const weekDays=Array.from({length:7},(_,i)=>shiftDate(today,-6+i));
  const weekStats=weekDays.map(d=>{const s=getDayStats(data.tasks,d);return{date:d,...s,pct:s.total?Math.round(s.rate*100):0}});
  const maxPct=Math.max(...weekStats.map(s=>s.pct),1);
  const recentFlowers=[...data.rewards.dayRewards].reverse().slice(0,7);
  const upcoming=getUpcomingSpecial(data.specialDates||[],today,7).filter(x=>x.daysAway>0);
  return`${toastHtml()}<header class="page-header"><h2>总览</h2><p>${formatDate(new Date())}</p></header>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${ts.done}/${ts.total}</div><div class="stat-label">今日任务</div></div>
      <div class="stat-card"><div class="stat-value">🌸 ${data.rewards.totalFlowers}</div><div class="stat-label">累计小红花</div></div>
      <div class="stat-card"><div class="stat-value">${ts.total?Math.round(ts.rate*100):0}%</div><div class="stat-label">今日完成度</div></div>
    </div>
    <div class="card"><div class="card-title">近 7 日完成率</div><div class="trend-chart">${weekStats.map(s=>`<div class="trend-bar"><span class="trend-bar-val">${s.pct}%</span><div class="trend-bar-fill" style="height:${Math.max(4,s.pct/maxPct*80)}px"></div><span class="trend-bar-label">${s.date.slice(5)}</span></div>`).join('')}</div></div>
    ${recentFlowers.length?`<div class="card"><div class="card-title">近 7 日小红花</div><ul class="reward-history">${recentFlowers.map(r=>`<li><span class="reward-date">${r.date.slice(5)}</span><span>${'🌸'.repeat(r.flowers)}</span><span class="reward-reason">${r.reasons.join('、')}</span></li>`).join('')}</ul></div>`:''}
    ${upcoming.length?`<div class="card"><div class="card-title">即将到来<span class="badge">${upcoming.length}</span></div><ul class="upcoming-special">${upcoming.map(({sd,date,daysAway})=>`<li><div class="upcoming-special-date">${daysAway} 天后 · ${formatShortDate(date)}</div><div class="upcoming-special-title">${sd.title}${sd.isLunar?'<span class="lunar-tag">农历</span>':''}</div>${sd.message?`<div class="upcoming-special-msg">${sd.message}</div>`:''}</li>`).join('')}</ul></div>`:'<div class="card"><div class="card-title">即将到来</div><p class="empty-hint">未来 7 天没有特殊日子</p></div>'}
    <div class="card"><div class="card-title">快捷入口</div><div class="quick-links">
      <button class="quick-link" onclick="page='tasks';render()"><div style="font-size:1.5rem">📌</div><div>今日任务打卡</div></button>
      <button class="quick-link" onclick="page='intervals';render()"><div style="font-size:1.5rem">⏰</div><div>定时提醒</div></button>
      <button class="quick-link" onclick="page='special';render()"><div style="font-size:1.5rem">🎂</div><div>特殊日子</div></button>
      <button class="quick-link" onclick="settings.darkMode=!settings.darkMode;saveSettings();render()"><div style="font-size:1.5rem">${settings.darkMode?'☀️':'🌙'}</div><div>${settings.darkMode?'浅色模式':'深色模式'}</div></button>
    </div></div>`;
}

const pages={tasks:renderTasks,intervals:renderIntervals,special:renderSpecial,dashboard:renderDashboard};

function render(){
  try{
  const today=todayStr(),od=getOverdueItems(data.tasks,today).length,sp=getSpecialForDate(data.specialDates||[],today).length;
  const activeIv=(data.intervalReminders||[]).filter(x=>x.enabled).length,ac=od+sp;
  document.getElementById('app').innerHTML=`
    <aside class="sidebar"><div class="sidebar-brand"><h1>效率手册</h1><p>Personal Efficiency Handbook</p></div>
      <nav>${NAV.map(n=>`<button class="nav-item ${page===n.id?'active':''}" onclick="page='${n.id}';render()"><span class="nav-icon">${n.icon}</span><span class="nav-label">${n.label}</span>${n.id==='special'&&sp>0?`<span class="nav-badge">${sp}</span>`:''}${n.id==='tasks'&&od>0?`<span class="nav-badge">${od}</span>`:''}${n.id==='intervals'&&activeIv>0?`<span class="nav-badge" style="background:var(--accent)">${activeIv}</span>`:''}</button>`).join('')}</nav>
      <div class="sidebar-footer"><button class="theme-toggle" onclick="settings.darkMode=!settings.darkMode;saveSettings();render()">${settings.darkMode?'☀️ 浅色模式':'🌙 深色模式'}</button><button class="btn-reset" onclick="if(confirm('恢复默认？')){data=defaultData();save();render()}">恢复默认数据</button></div>
    </aside><main class="main">${ac>0&&page!=='tasks'&&page!=='special'?`<button class="reminder-bar" onclick="page='special';render()">🔔 ${sp>0?getSpecialForDate(data.specialDates,today).map(s=>s.title).join('、'):''}${sp>0&&od>0?' · ':''}${od>0?`逾期 ${od} 项任务`:''}</button>`:''}${(pages[page]||renderTasks)()}</main>`;
  if(page==='tasks')scrollWeekToToday();
  }catch(e){console.error(e);document.getElementById('app').innerHTML=`<div style="padding:40px"><h2>加载出错</h2><p style="color:#dc2626">${e.message}</p><button class="btn-primary" onclick="localStorage.removeItem('${STORAGE_KEY}');location.reload()">清除数据并重试</button></div>`}
}
document.documentElement.setAttribute('data-theme',settings.darkMode?'dark':'light');
saveSettings();
render();
tryAllNotify();
setInterval(tryAllNotify,30000);
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
